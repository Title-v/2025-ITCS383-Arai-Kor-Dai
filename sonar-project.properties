sonar.projectKey=FantasticRattee_2025-ITCS383-Arai-Kor-Dai
sonar.organization=fantasticrattee

sonar.sources=implementations/
sonar.tests=implementations/backend/__tests__

sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

# Exclude unnecessary files
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.test.js

# Coverage only applies to backend (where we have tests)
# Frontend pages are UI-only and tested manually
sonar.coverage.exclusions=implementations/frontend/**

# Test coverage report
sonar.javascript.lcov.reportPaths=implementations/backend/coverage/lcov.info
