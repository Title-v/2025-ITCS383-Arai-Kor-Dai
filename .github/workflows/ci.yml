name: CI - Build, Test & SonarCloud

on:
  push:
    branches: [master, Phrase-2]
  pull_request:
    branches: [master, Phrase-2]

jobs:
  backend-test:
    name: Backend - Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: implementations/backend/package-lock.json

      - name: Install dependencies
        working-directory: implementations/backend
        run: npm ci

      - name: Run tests with coverage
        working-directory: implementations/backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run test:ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: implementations/backend/coverage/

  frontend-build:
    name: Frontend - Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: implementations/frontend/package-lock.json

      - name: Install dependencies
        working-directory: implementations/frontend
        run: npm ci

      - name: Build frontend
        working-directory: implementations/frontend
        run: npm run build
        env:
          CI: false

  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-test]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: implementations/backend/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=${{ github.repository_owner }}
            -Dsonar.projectKey=${{ github.repository_owner }}_2025-ITCS383-Arai-Kor-Dai
            -Dsonar.sources=implementations/
            -Dsonar.tests=implementations/backend/__tests__
            -Dsonar.javascript.lcov.reportPaths=implementations/backend/coverage/lcov.info
